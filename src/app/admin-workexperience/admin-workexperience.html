<div class ="container color-dark">

    <div class = "col">
    
        <p>work-experience items</p>

    </div>

</div>
<div class ="container color-ligth">

    <div class = "col">

        <form>
          <input type="text" class="txt" name="startDate" placeholder="start date (mmm/yyyy)" [(ngModel)]= "myWorkExperience.startDate"> <br>
          <input type="text" class="txt" name="endDate" placeholder="end date (mm/yyyy)" [(ngModel)]= "myWorkExperience.endDate"><br>
          <input type="text" class="txt" name="location" placeholder="location (city, country)" [(ngModel)]= "myWorkExperience.location"><br>
          <input type="text" class="txt" name="position" placeholder="position" [(ngModel)]= "myWorkExperience.position"><br>
          <input type="text" class="txt" name="company" placeholder="company" [(ngModel)]= "myWorkExperience.company"><br>
          <input type="text" class="txt" name="accomplishments" placeholder="acomplishments (comma separated)" [(ngModel)]= "acomplishmentsInput"><br>

          <input type="button" class ="btn" value="{{ btntxt }}" (click)="agregarJob()">
        </form>
    </div>

    <div class = "col">
     <div class="life-container" style="flex-direction: column; align-items: stretch;" *ngFor="let job of workExperience;">

       <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
         <span><strong>{{job.company}}</strong> - {{job.position}}</span>
         <input type="button" class ="btn" value="delete" (click)='deleteJob(job.id)'>
       </div>

       <div class="capsules-container" *ngIf="job.acomplishments && job.acomplishments.length > 0">
         <span class="capsule" *ngFor="let acc of job.acomplishments">{{acc}}</span>
       </div>

     </div>

    </div>

</div>
